databases:
  - name: noblesse-db
    databaseName: noblesse_db
    user: noblesse_user
    plan: free

services:
  - type: web
    name: noblesse-school
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn run:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: DATABASE_URL
        fromDatabase:
          name: noblesse-db
          property: connectionString
